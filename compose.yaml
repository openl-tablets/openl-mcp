# Full-stack demo: OpenL Studio + MCP Server.
#
# The MCP server is NOT a custom image — it runs on the official Node image and
# fetches the latest nightly build via npx: the `x` prerelease tarball published
# by .github/workflows/deploy.yml. No build step, no image to maintain.
#
# Start everything:  docker compose up -d
# Studio UI:         http://localhost:8080   (single-user mode, no auth)
# MCP endpoint:      http://localhost:3000/mcp
#
# To run a released version from npm instead, swap the command for:
#   npx -y openl-mcp http://studio:8080 --http
services:
  studio:
    image: ghcr.io/openl-tablets/webstudio:x
    pull_policy: always
    container_name: openl-studio
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"

  openl-mcp:
    image: node:lts-alpine
    command: npx -y -p https://github.com/openl-tablets/openl-mcp/releases/download/x/openl-mcp.tgz openl-mcp http://studio:8080 --http
    container_name: openl-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - studio
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
