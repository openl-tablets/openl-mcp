# This workflow will build MCP server every day (aka Nightly Build)
# and deploys the package to the GitHub Packages.

name: Build MCP package

on:
  schedule:
    # Every day at 23:00 UTC+3
    - cron: '0 20 * * *'
  # Manual run from the GitHub action page
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-slim

    permissions:
      # Needed to move the 'x' tag and publish the prerelease via gh.
      contents: write

    steps:

      - name: Checkout ${{ github.event.inputs.branch || 'main' }}
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Install dependencies
        run: npm ci

      # Gate the release behind the same quality checks PRs run. A release
      # MUST NOT be cut if main is red.
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # npm pack names the tarball openl-mcp-<version>.tgz; rename it to a
      # fixed, version-free name so the release download URL stays stable.
      - name: Generate Tarball
        run: |
          npm pack
          mv ./*.tgz openl-mcp.tgz

      # Publish the tarball to a single, always-available 'x' prerelease.
      # The 'x' tag is recreated on the freshly built commit every run, so it
      # always points at the latest nightly and its tarball is downloadable.
      - name: Publish tarball to 'x' prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Drop the previous prerelease and its tag so 'x' moves to HEAD.
          gh release delete x --yes --cleanup-tag || true
          gh release create x openl-mcp.tgz \
            --target "$(git rev-parse HEAD)" \
            --title x \
            --notes "Latest nightly build tarball." \
            --prerelease
