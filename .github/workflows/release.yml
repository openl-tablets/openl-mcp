# Release npm package to npmjs.com — single source of truth for releases.
#
# Manually triggered via the Actions UI from the `main` branch. The workflow
# is the only intended way to cut a release: it lint+tests+builds, bumps
# package.json, commits + pushes directly to main, tags, and FINALLY
# publishes to npm.
#
# Order matters: `npm publish` is the LAST step on purpose. The git state
# on main is fully consistent (commit + tag pushed) before any irreversible
# npm operation happens. Recovery semantics:
#   - Commit push fails    → no npm, no tag, no commit. Clean retry.
#   - Tag push fails       → commit on main, no tag, no npm. Create the
#                            tag manually, then re-run `npm publish` from
#                            the tagged commit.
#   - npm publish fails    → commit + tag on main, version not on npm.
#                            Re-run `npm publish` manually from the tagged
#                            checkout. The version number is NOT burned.
#
# Authentication: OIDC via npm Trusted Publishers — no NPM_TOKEN secret
# needed. Configure once on npmjs.com under the package's Access settings:
#   Trusted Publisher → GitHub Actions
#     Organization:       openl-tablets
#     Repository:         openl-mcp
#     Workflow filename:  release.yml

name: Release (npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest

    permissions:
      contents: write   # to commit version bump and push tag
      id-token: write   # required for npm provenance via OIDC

    steps:
      - name: Guard — releases only from main
        if: github.ref_name != 'main'
        run: |
          echo "::error::Releases can only be cut from 'main' (got '${{ github.ref_name }}')."
          exit 1

      - name: Configure git identity
        run: |
          git config --global user.name "OpenL Tablets"
          git config --global user.email openltablets@gmail.com

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Gate the release behind the same quality checks PRs run. A release
      # MUST NOT be cut if main is red.
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # `npm version <bump>` bumps package.json + creates commit + annotated
      # tag in one shot. `--tag-version-prefix=""` drops the default `v`
      # prefix so tags match the existing X.Y.Z scheme in the repo.
      # And push the tag BEFORE npm publish.
      # If anything below fails, git state stays consistent and recoverable.
      - name: Bump package.json version, create commit and tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          NEW_VERSION=$(npm version "${{ inputs.bump }}" --tag-version-prefix="" --message "Release %s")
          git push --atomic origin "HEAD:${REF_NAME}" "refs/tags/${NEW_VERSION}"

      # README swap is done after the push so the npm-specific README is
      # not committed to main. It only ends up in the npm tarball.
      - name: Use npm-specific README for the package tarball
        run: cp README.npm.md README.md

      # LAST irreversible step. Everything before it is recoverable; this
      # is not. By the time we get here, git has the consistent state
      # (commit on main + tag pointing at it). If npm publish fails,
      # re-run `npm publish` manually from the tagged checkout.
      - name: Publish to npm
        # No NODE_AUTH_TOKEN — authentication is negotiated via OIDC
        # (npm Trusted Publishers). Provenance is attested automatically.
        run: npm publish --access public --provenance
