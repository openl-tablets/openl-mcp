# Release npm package to npmjs.com — single source of truth for releases.
#
# Manually triggered via the Actions UI from the `main` branch. The workflow
# is the only intended way to cut a release: it lint+tests+builds, bumps
# package.json on a release-prep branch, opens a PR, admin-merges it back
# into main, tags the merge commit, and FINALLY publishes to npm.
#
# Order matters: npm publish is the LAST step on purpose. The git state on
# main is fully consistent (commit + tag pushed) before any irreversible
# npm operation happens. Recovery semantics:
#   - PR/merge fails       → no npm, no tag, no commit. Clean retry.
#   - Tag push fails       → commit on main, no tag, no npm. Create tag
#                            manually, then re-run `npm publish` from the
#                            tagged commit.
#   - npm publish fails    → commit + tag on main, version not on npm.
#                            Re-run `npm publish` manually from the tagged
#                            checkout. The version number is NOT burned.
#
# Docker Hub publishing is decoupled: trigger publish-dockerhub.yml manually
# after a release (or any time) to ship a Docker image for a given version.
#
# Authentication:
# - npm:  OIDC via npm Trusted Publishers — no NPM_TOKEN secret needed.
#         Configure once on npmjs.com under the package's Access settings:
#           Trusted Publisher → GitHub Actions
#             Organization:       openl-tablets
#             Repository:         openl-mcp
#             Workflow filename:  release.yml
# - git:  RELEASE_TOKEN repo secret — a PAT (or GitHub App token) belonging
#         to a user/app with the admin role on this repo, so it can bypass
#         the "Copilot review for default branch" ruleset via
#         `gh pr merge --admin`. The default GITHUB_TOKEN does not qualify.
#         Required fine-grained PAT permissions:
#           Contents: Read and write
#           Pull requests: Read and write
#           Workflows: Read and write
#         (or a classic PAT with the `repo` and `workflow` scopes).

name: Release (npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

# Serialize releases — two parallel runs would race on `npm version`, the
# release-prep branch name, and the npm publish. We don't cancel an
# in-progress run because cancelling mid-publish would leave inconsistent
# state.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest

    permissions:
      contents: write       # tag push
      pull-requests: write  # open + admin-merge release PR
      id-token: write       # npm provenance via OIDC

    steps:
      - name: Guard — releases only from main
        if: github.ref_name != 'main'
        run: |
          echo "::error::Releases can only be cut from 'main' (got '${{ github.ref_name }}')."
          exit 1

      - name: Configure git identity
        run: |
          git config --global user.name "OpenL Tablets"
          git config --global user.email "openltablets@gmail.com"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # RELEASE_TOKEN must be a PAT (or GitHub App token) owned by a
          # repo admin — bypasses the ruleset on the default branch when
          # merging the release PR with --admin and when pushing the tag.
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Gate the release behind the same quality checks PRs run. A release
      # MUST NOT be cut if main is red.
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # Bump locally (no commit, no tag) so we control commit + tag below.
      - name: Compute next version
        id: bump
        run: |
          NEW_VERSION=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
          NEW_VERSION="${NEW_VERSION#v}"
          echo "Next version: ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release-prep branch and open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
          BASE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="release-prep/${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "Release ${VERSION}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Release ${VERSION}" \
            --body "Automated version bump for npm release **${VERSION}**.

          This PR was opened by the \`release.yml\` workflow and will be
          admin-merged immediately. The merge commit is then tagged
          \`${VERSION}\` and published to npm." \
            --base "$BASE" \
            --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # Squash-merge with --admin so the PR satisfies the
      # "Changes must be made through a pull request" rule structurally,
      # while the admin token bypasses required reviews (Copilot review).
      - name: Admin-merge release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: gh pr merge --admin --squash --delete-branch "${{ steps.pr.outputs.pr_url }}"

      - name: Fast-forward to merge commit
        env:
          BASE: ${{ github.ref_name }}
        run: |
          git fetch origin "$BASE"
          git checkout "$BASE"
          git reset --hard "origin/$BASE"

      # Tag the squash-merge commit (now HEAD of main) and push the tag
      # BEFORE npm publish. This way, if anything below fails, the git
      # state is already consistent and recoverable.
      - name: Tag release commit and push tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

      # README swap is done after the merge so the npm-specific README is
      # not committed to main. It only ends up in the npm tarball.
      - name: Use npm-specific README for the package tarball
        run: cp README.npm.md README.md

      # LAST irreversible step. Everything before it is recoverable; this
      # is not. By the time we get here, git has the consistent state
      # (commit on main + tag pointing at it). If npm publish fails,
      # re-run `npm publish` manually from the tagged checkout.
      - name: Publish to npm
        # No NODE_AUTH_TOKEN — authentication is negotiated via OIDC
        # (npm Trusted Publishers). Provenance is attested automatically.
        run: npm publish --access public --provenance
