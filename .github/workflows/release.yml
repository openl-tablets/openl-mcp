# Release npm package to npmjs.com — single source of truth for releases.
#
# Manually triggered via the Actions UI from the `main` branch. The workflow
# is the only intended way to cut a release: it lint+tests+builds, bumps
# package.json, commits + pushes directly to main, tags, and FINALLY
# publishes to npm.
#
# Order matters: `npm publish` is the LAST step on purpose. The git state
# on main is fully consistent (commit + tag pushed) before any irreversible
# npm operation happens. Recovery semantics:
#   - Commit push fails    → no npm, no tag, no commit. Clean retry.
#   - Tag push fails       → commit on main, no tag, no npm. Create the
#                            tag manually, then re-run `npm publish` from
#                            the tagged commit.
#   - npm publish fails    → commit + tag on main, version not on npm.
#                            Re-run `npm publish` manually from the tagged
#                            checkout. The version number is NOT burned.
#
# Docker Hub publishing is decoupled: trigger publish-dockerhub.yml manually
# after a release (or any time) to ship a Docker image for a given version.
#
# Authentication:
# - npm:  OIDC via npm Trusted Publishers — no NPM_TOKEN secret needed.
#         Configure once on npmjs.com under the package's Access settings:
#           Trusted Publisher → GitHub Actions
#             Organization:       openl-tablets
#             Repository:         openl-mcp
#             Workflow filename:  release.yml
# - git:  GitHub App `openl-tablets-release` (or equivalent) installed on
#         this repo and added to the "Copilot review for default branch"
#         ruleset bypass list. The workflow mints a short-lived (~1h)
#         installation token at runtime via `actions/create-github-app-token`
#         and uses it for the direct push to main.
#         Required repo secrets:
#           APP_ID           — the GitHub App's numeric ID
#           APP_PRIVATE_KEY  — contents of the App's .pem private key
#         Required App permissions (Repository):
#           Contents: Read and write
#           Workflows: Read and write
#           Metadata: Read-only (auto)

name: Release (npm)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch
          - minor
          - major

# Serialize releases — two parallel runs would race on `npm version` and
# `npm publish`. Don't cancel in-progress: cancelling mid-publish would
# leave inconsistent state.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest

    permissions:
      contents: write       # tag + main push (via App token)
      id-token: write       # npm provenance via OIDC

    steps:
      - name: Guard — releases only from main
        if: github.ref_name != 'main'
        run: |
          echo "::error::Releases can only be cut from 'main' (got '${{ github.ref_name }}')."
          exit 1

      # Mint a short-lived (~1h) installation token from the release App.
      # The App is in the ruleset bypass list, so this token can push to
      # main directly without going through a PR.
      - name: Mint App installation token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure git identity
        run: |
          # Use the App's bot identity so the commit shows up as
          # "<app-slug>[bot]" in the GitHub UI and is attributable.
          git config --global user.name "${{ steps.app.outputs.app-slug }}[bot]"
          git config --global user.email "${{ steps.app.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Gate the release behind the same quality checks PRs run. A release
      # MUST NOT be cut if main is red.
      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # Bump locally (no commit, no tag) so we control commit + tag below.
      - name: Compute next version
        id: bump
        run: |
          NEW_VERSION=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
          NEW_VERSION="${NEW_VERSION#v}"
          echo "Next version: ${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      # Direct push to main via the App's bypass on the ruleset. If main
      # moved during the build (rare but possible), bail out loudly rather
      # than silently rebasing the release commit over unknown changes.
      - name: Commit bump and push to main
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BASE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git add package.json package-lock.json
          git commit -m "Release ${VERSION}"
          git fetch origin "$BASE"
          if ! git merge-base --is-ancestor "origin/${BASE}" HEAD; then
            echo "::error::'${BASE}' moved during the release run; refusing to rebase. Retry the workflow."
            exit 1
          fi
          git push origin "HEAD:${BASE}"

      # Tag the release commit (now HEAD of main) and push the tag
      # BEFORE npm publish. If anything below fails, git state stays
      # consistent and recoverable.
      - name: Tag release commit and push tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

      # README swap is done after the push so the npm-specific README is
      # not committed to main. It only ends up in the npm tarball.
      - name: Use npm-specific README for the package tarball
        run: cp README.npm.md README.md

      # LAST irreversible step. Everything before it is recoverable; this
      # is not. By the time we get here, git has the consistent state
      # (commit on main + tag pointing at it). If npm publish fails,
      # re-run `npm publish` manually from the tagged checkout.
      - name: Publish to npm
        # No NODE_AUTH_TOKEN — authentication is negotiated via OIDC
        # (npm Trusted Publishers). Provenance is attested automatically.
        run: npm publish --access public --provenance
