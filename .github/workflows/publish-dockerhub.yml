# Publish Docker image to Docker Hub from the published npm package.
#
# Manually triggered. The version input is optional:
#   - blank  → ship the npm `latest` dist-tag; image is tagged `:VERSION`
#              and `:latest` on Docker Hub
#   - X.Y.Z  → ship that specific version; image is tagged `:VERSION` only
#              (the `:latest` tag on Docker Hub is NOT moved — useful when
#              republishing an older release)
#
# Pulls openl-mcp-server@VERSION from npmjs.com, builds multi-platform Docker
# images (amd64 + arm64) using Dockerfile.npm, and pushes to Docker Hub.

name: Publish (Docker Hub)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z) — leave blank to use the latest npm release (then also tag :latest)'
        required: false
        type: string

jobs:
  publish:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Resolve VERSION and whether to move :latest
        id: version
        run: |
          VERSION=${{ inputs.version }}
          if [ -n "$VERSION" ]; then
            IS_LATEST=false
            echo "Explicit version supplied: $VERSION (':latest' tag will NOT be moved)"
          else
            VERSION=$(npm view openl-mcp-server version)
            if [ -z "$VERSION" ]; then
              echo "::error::failed to query latest openl-mcp-server version from npm"
              exit 1
            fi
            IS_LATEST=true
            echo "No version input — using npm latest: $VERSION (':latest' tag will be moved)"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_latest=$IS_LATEST" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: openltablets/openl-mcp
          # Manage tags explicitly. ':latest' is only added when the workflow
          # is shipping the npm `latest` dist-tag (no version input). For
          # explicit-version dispatches we tag :VERSION only and leave the
          # :latest pointer untouched.
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_latest == 'true' }}
          # Override the few labels metadata-action can't infer correctly:
          # - revision must come from the tag's SHA (not github.sha, which
          #   is the workflow-trigger SHA on main and may drift from the tag)
          # - title/description are repo-specific and not derived from npm
          labels: |
            org.opencontainers.image.title=OpenL MCP Server
            org.opencontainers.image.description=Model Context Protocol server for OpenL Studio
            org.opencontainers.image.licenses=LGPL-3.0
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.revision="$GITHUB_SHA"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.npm
          platforms: linux/amd64,linux/arm64/v8
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
